<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Field Ops"/>
  <meta name="theme-color" content="#1c1e22"/>
  <title>Team — J&D Western Electric</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="theme.css"/>
  <style>
    body { visibility: hidden; background: #f1f3f5; margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Layout ── */
    .tm-layout { display: flex; min-height: calc(100vh - 56px); }

    /* ── Sidebar ── */
    .tm-sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--graphite, #2e3138); color: #fff;
      padding: 20px 0 32px;
      display: flex; flex-direction: column; gap: 0;
      position: sticky; top: 56px; height: calc(100vh - 56px); overflow-y: auto;
    }
    .tm-sidebar-section { padding: 0 12px; margin-bottom: 24px; }
    .tm-sidebar-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #6b7280; padding: 0 8px; margin-bottom: 6px; }
    .tm-nav-btn {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px; border-radius: 8px;
      background: none; border: none; color: #d1d5db; cursor: pointer;
      font-size: 13px; font-weight: 600; text-align: left;
      transition: background .12s, color .12s; margin-bottom: 2px;
    }
    .tm-nav-btn:hover { background: rgba(255,255,255,.07); color: #fff; }
    .tm-nav-btn.active { background: rgba(234,88,12,.18); color: #f97316; }
    .tm-nav-btn svg { flex-shrink: 0; }
    .tm-sidebar-count {
      margin-left: auto; font-size: 11px; font-weight: 700;
      background: rgba(255,255,255,.1); color: #9ca3af;
      border-radius: 20px; padding: 1px 7px; min-width: 20px; text-align: center;
    }
    .tm-nav-btn.active .tm-sidebar-count { background: rgba(234,88,12,.25); color: #f97316; }

    .tm-invite-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin: 0 12px 16px;
      padding: 11px 14px; border-radius: 10px;
      background: #ea580c; color: #fff; border: none; cursor: pointer;
      font-size: 13px; font-weight: 700; transition: background .12s;
    }
    .tm-invite-btn:hover { background: #c2410c; }

    /* ── Main content ── */
    .tm-main { flex: 1; padding: 24px 28px 48px; min-width: 0; }
    .tm-main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .tm-main-title { font-size: 20px; font-weight: 800; color: #111; }
    .tm-search { padding: 8px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; background: #fff; width: 220px; outline: none; }
    .tm-search:focus { border-color: #ea580c; }

    /* ── Member cards ── */
    .tm-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
    .tm-card {
      background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07);
      padding: 18px 16px; cursor: pointer; transition: box-shadow .15s, transform .12s;
      border: 2px solid transparent; position: relative;
    }
    .tm-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); transform: translateY(-1px); border-color: #e5e7eb; }
    .tm-card.selected { border-color: #ea580c; box-shadow: 0 0 0 3px rgba(234,88,12,.1); }
    .tm-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .tm-avatar {
      width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .tm-card-name { font-weight: 700; font-size: 14px; color: #111; }
    .tm-card-email { font-size: 11px; color: #6b7280; margin-top: 1px; word-break: break-all; }
    .tm-card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

    .role-pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .role-admin { background: #dbeafe; color: #1d4ed8; }
    .role-field { background: #f3f4f6; color: #374151; }
    .status-pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-active   { background: #dcfce7; color: #166534; }
    .status-invited  { background: #fef3c7; color: #92400e; }
    .status-inactive { background: #f3f4f6; color: #6b7280; }

    .tm-card-me { position: absolute; top: 10px; right: 12px; font-size: 10px; font-weight: 700; color: #ea580c; background: rgba(234,88,12,.08); padding: 2px 6px; border-radius: 6px; }

    /* ── Empty state ── */
    .tm-empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .tm-empty svg { margin-bottom: 14px; opacity: .35; }

    /* ── Right drawer ── */
    .tm-drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 300;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .tm-drawer-overlay.open { opacity: 1; pointer-events: all; }
    .tm-drawer {
      position: fixed; top: 0; right: 0; height: 100%; width: 420px; max-width: 95vw;
      background: #fff; z-index: 310; box-shadow: -8px 0 40px rgba(0,0,0,.18);
      transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .tm-drawer.open { transform: translateX(0); }
    .tm-drawer-head {
      padding: 20px 20px 16px; border-bottom: 1px solid #f3f4f6;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
      background: var(--graphite, #2e3138); color: #fff;
    }
    .tm-drawer-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .tm-drawer-head-name { font-size: 16px; font-weight: 800; }
    .tm-drawer-head-email { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .tm-drawer-close { margin-left: auto; background: rgba(255,255,255,.1); border: none; color: #fff; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .tm-drawer-close:hover { background: rgba(255,255,255,.2); }

    .tm-drawer-tabs { display: flex; border-bottom: 1px solid #f3f4f6; background: #fff; flex-shrink: 0; }
    .tm-dtab { flex: 1; padding: 12px 8px; text-align: center; font-size: 12px; font-weight: 700; color: #6b7280; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; transition: color .12s, border-color .12s; }
    .tm-dtab.active { color: #ea580c; border-bottom-color: #ea580c; }

    .tm-drawer-body { flex: 1; overflow-y: auto; padding: 20px; }
    .tm-drawer-footer { padding: 14px 20px; border-top: 1px solid #f3f4f6; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }

    /* ── Form elements ── */
    .td-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #6b7280; margin-bottom: 5px; }
    .td-input { width: 100%; padding: 9px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; background: #fff; outline: none; box-sizing: border-box; }
    .td-input:focus { border-color: #ea580c; }
    .td-select { width: 100%; padding: 9px 12px; border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 13px; background: #fff; outline: none; cursor: pointer; box-sizing: border-box; }
    .td-select:focus { border-color: #ea580c; }
    .td-row { margin-bottom: 16px; }
    .td-section-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; color: #374151; margin: 20px 0 10px; border-top: 1px solid #f3f4f6; padding-top: 16px; }
    .td-section-title:first-child { margin-top: 0; border-top: none; padding-top: 0; }

    /* ── Permission toggles ── */
    .perm-grid { display: flex; flex-direction: column; gap: 8px; }
    .perm-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f9fafb; border-radius: 8px; }
    .perm-row-name { font-size: 13px; font-weight: 600; color: #374151; }
    .perm-toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .perm-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .perm-toggle-track {
      position: absolute; inset: 0; border-radius: 20px; background: #d1d5db; cursor: pointer; transition: background .15s;
    }
    .perm-toggle input:checked + .perm-toggle-track { background: #ea580c; }
    .perm-toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: #fff;
      transition: transform .15s; pointer-events: none;
    }
    .perm-toggle input:checked ~ .perm-toggle-thumb { transform: translateX(16px); }

    /* ── Actions panel ── */
    .action-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 14px; background: #f9fafb; border-radius: 10px; margin-bottom: 8px;
    }
    .action-item-info { flex: 1; }
    .action-item-title { font-size: 13px; font-weight: 700; color: #111; }
    .action-item-desc { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .action-btn { padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; }
    .action-btn-gray { background: #e5e7eb; color: #374151; }
    .action-btn-gray:hover { background: #d1d5db; }
    .action-btn-orange { background: #ea580c; color: #fff; }
    .action-btn-orange:hover { background: #c2410c; }
    .action-btn-red { background: #fef2f2; color: #dc2626; }
    .action-btn-red:hover { background: #fee2e2; }
    .action-btn-green { background: #dcfce7; color: #166534; }
    .action-btn-green:hover { background: #bbf7d0; }

    /* ── Color swatch ── */
    .color-swatch-wrap { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: #f9fafb; border-radius: 8px; }
    .color-swatch { width: 36px; height: 36px; border-radius: 8px; border: 2px solid rgba(0,0,0,.1); cursor: pointer; padding: 1px; background: none; }

    /* ── Invite drawer ── */
    .inv-drawer-head { background: var(--graphite, #2e3138); color: #fff; padding: 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .inv-drawer-head h3 { font-size: 16px; font-weight: 800; }
    .inv-result-box { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 10px; padding: 14px; margin-top: 16px; }
    .inv-result-box .inv-url { font-family: monospace; font-size: 11px; color: #ea580c; word-break: break-all; margin: 8px 0 10px; padding: 6px 8px; background: #fff; border-radius: 6px; border: 1px solid #e5e7eb; }

    /* ── Pending invites list ── */
    .pending-row { display: flex; align-items: center; gap: 12px; padding: 12px; background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; margin-bottom: 8px; }
    .pending-avatar { width: 38px; height: 38px; border-radius: 50%; background: #fef3c7; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; color: #92400e; flex-shrink: 0; }

    /* ── Warning ── */
    .warn-box { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; display: none; margin-bottom: 12px; }

    /* ── Save btn ── */
    .btn-save-primary { padding: 10px 20px; background: #ea580c; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-save-primary:hover { background: #c2410c; }
    .btn-save-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cancel-secondary { padding: 10px 16px; background: #f3f4f6; color: #374151; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-cancel-secondary:hover { background: #e5e7eb; }

    /* ── Mobile tab strip (replaces sidebar) ── */
    .tm-tabstrip {
      display: none;
      background: var(--graphite, var(--graphite, #2e3138));
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
      position: sticky; top: 52px; z-index: 50;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .tm-tabstrip::-webkit-scrollbar { display: none; }
    .tm-tabstrip-inner { display: flex; padding: 0 8px; gap: 2px; white-space: nowrap; min-width: max-content; }
    .tm-tab-pill {
      padding: 10px 14px; color: #9ca3af; font-size: 12px; font-weight: 700;
      border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent;
      white-space: nowrap; transition: color .12s, border-color .12s;
    }
    .tm-tab-pill.active { color: #f97316; border-bottom-color: #f97316; }

    @media(max-width:700px){
      .tm-sidebar { display: none; }
      .tm-tabstrip { display: block; }
      .tm-layout { flex-direction: column; }
      .tm-main { padding: 14px 12px 80px; }
      .tm-main-header { flex-wrap: wrap; gap: 10px; }
      .tm-search { width: 100%; }
      .tm-cards { grid-template-columns: 1fr 1fr; gap: 10px; }
      .tm-drawer { width: 100%; max-width: 100%; }
      .tm-invite-btn-mobile {
        position: fixed; bottom: 20px; right: 16px; z-index: 200;
        width: 52px; height: 52px; border-radius: 50%;
        background: #ea580c; color: #fff; border: none; cursor: pointer;
        font-size: 26px; display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 16px rgba(234,88,12,.45);
      }
    }
    @media(max-width:400px){
      .tm-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header class="app-header">
  <div class="header-brand">
    <a href="index.html"><img class="header-logo" src="logo-bolt.png" alt="J&D Western Electric"/></a>
    <div class="header-title">
      <span class="company">J&D Western Electric</span>
      <span class="module">Team</span>
    </div>
  </div>
  <nav class="header-nav" style="display:flex;gap:4px;align-items:center;">
    <a href="office.html">Dashboard</a>
    <a href="#" id="logout-btn">Sign Out</a>
  </nav>
</header>

<!-- Mobile tab strip — hidden on desktop, shown on mobile via CSS -->
<div class="tm-tabstrip" id="tm-tabstrip">
  <div class="tm-tabstrip-inner">
    <button class="tm-tab-pill active" onclick="setView('all',this)">All Members</button>
    <button class="tm-tab-pill" onclick="setView('admin',this)">Office Admin</button>
    <button class="tm-tab-pill" onclick="setView('field',this)">Field Users</button>
    <button class="tm-tab-pill" onclick="setView('pending',this)">Pending</button>
  </div>
</div>

<!-- Mobile FAB invite button -->
<button class="tm-invite-btn-mobile" id="btn-open-invite-fab" onclick="openInviteDrawer()" title="Invite member" style="display:none;">+</button>

<div class="tm-layout">

  <!-- ── Sidebar ── -->
  <aside class="tm-sidebar">
    <button class="tm-invite-btn" id="btn-open-invite">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Invite Member
    </button>

    <div class="tm-sidebar-section">
      <div class="tm-sidebar-label">Views</div>
      <button class="tm-nav-btn active" id="nav-all" onclick="setView('all')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        All Members
        <span class="tm-sidebar-count" id="cnt-all">—</span>
      </button>
      <button class="tm-nav-btn" id="nav-admin" onclick="setView('admin')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Office Admin
        <span class="tm-sidebar-count" id="cnt-admin">—</span>
      </button>
      <button class="tm-nav-btn" id="nav-field" onclick="setView('field')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><line x1="12" y1="7" x2="12" y2="17"/></svg>
        Field Users
        <span class="tm-sidebar-count" id="cnt-field">—</span>
      </button>
      <button class="tm-nav-btn" id="nav-pending" onclick="setView('pending')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Pending Invites
        <span class="tm-sidebar-count" id="cnt-pending">—</span>
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="tm-main">
    <div class="tm-main-header">
      <div class="tm-main-title" id="main-view-title">All Members</div>
      <input type="search" class="tm-search" id="tm-search" placeholder="Search by name or email…" oninput="renderCards()"/>
    </div>
    <div class="tm-cards" id="tm-cards"></div>
    <div class="tm-empty" id="tm-empty" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <div style="font-size:14px;font-weight:700;color:#6b7280;">No members found</div>
    </div>
  </main>
</div>

<!-- ══════════════════════════════════════
     MEMBER DETAIL DRAWER
══════════════════════════════════════ -->
<div class="tm-drawer-overlay" id="member-overlay" onclick="closeMemberDrawer()"></div>
<div class="tm-drawer" id="member-drawer">
  <div class="tm-drawer-head">
    <div class="tm-drawer-avatar" id="md-avatar">JD</div>
    <div>
      <div class="tm-drawer-head-name" id="md-name">—</div>
      <div class="tm-drawer-head-email" id="md-email">—</div>
    </div>
    <button class="tm-drawer-close" onclick="closeMemberDrawer()">×</button>
  </div>
  <div class="tm-drawer-tabs">
    <button class="tm-dtab active" id="dtab-profile" onclick="switchDTab('profile')">Profile</button>
    <button class="tm-dtab" id="dtab-perms" onclick="switchDTab('perms')">Permissions</button>
    <button class="tm-dtab" id="dtab-actions" onclick="switchDTab('actions')">Actions</button>
  </div>
  <div class="tm-drawer-body" id="md-body"></div>
  <div class="tm-drawer-footer" id="md-footer"></div>
</div>

<!-- ══════════════════════════════════════
     INVITE DRAWER
══════════════════════════════════════ -->
<div class="tm-drawer-overlay" id="invite-overlay" onclick="closeInviteDrawer()"></div>
<div class="tm-drawer" id="invite-drawer">
  <div class="inv-drawer-head">
    <h3>Invite New Member</h3>
    <button class="tm-drawer-close" onclick="closeInviteDrawer()">×</button>
  </div>
  <div class="tm-drawer-body">
    <div class="warn-box" id="inv-warn"></div>

    <div class="td-row">
      <div class="td-label">Full Name</div>
      <input type="text" class="td-input" id="inv-name" placeholder="Jane Smith"/>
    </div>
    <div class="td-row">
      <div class="td-label">Email Address</div>
      <input type="email" class="td-input" id="inv-email" placeholder="jane@example.com"/>
    </div>
    <div class="td-row">
      <div class="td-label">Role</div>
      <select class="td-select" id="inv-role">
        <option value="field">Field User</option>
        <option value="admin">Office Admin</option>
      </select>
    </div>

    <div class="td-section-title">Module Permissions</div>
    <div class="perm-grid" id="inv-perms-grid"></div>

    <div class="inv-result-box" id="inv-result" style="display:none;">
      <strong style="font-size:13px;color:#166534;">✅ Member invited!</strong>
      <div style="font-size:12px;color:#374151;margin-top:4px;">Share this link to activate their account:</div>
      <div class="inv-url" id="inv-url"></div>
      <button class="action-btn action-btn-orange" onclick="copyInviteLink()" style="font-size:12px;">Copy Link</button>
    </div>
  </div>
  <div class="tm-drawer-footer">
    <button class="btn-save-primary" id="btn-do-invite">Send Invitation</button>
    <button class="btn-cancel-secondary" onclick="closeInviteDrawer()">Cancel</button>
  </div>
</div>

<!-- Reset Password Modal -->
<div class="tm-drawer-overlay" id="pw-overlay" onclick="closePwModal()" style="z-index:400;"></div>
<div style="position:fixed;inset:0;z-index:410;display:flex;align-items:center;justify-content:center;pointer-events:none;" id="pw-modal-wrap">
  <div id="pw-modal" style="background:#fff;border-radius:14px;width:360px;max-width:90vw;box-shadow:0 16px 48px rgba(0,0,0,.2);transform:scale(.95);transition:transform .18s;pointer-events:all;display:none;">
    <div style="padding:18px 20px 14px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:16px;font-weight:800;">Reset Password</span>
      <button onclick="closePwModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#6b7280;">×</button>
    </div>
    <div style="padding:18px 20px;">
      <p style="font-size:13px;color:#6b7280;margin:0 0 14px;">Set a temporary password for <strong id="pw-modal-name"></strong>.</p>
      <div class="warn-box" id="pw-warn"></div>
      <div class="td-row"><div class="td-label">New Password</div><input type="password" class="td-input" id="pw-new" placeholder="Min 8 characters" autocomplete="new-password"/></div>
      <div class="td-row" style="margin-bottom:0;"><div class="td-label">Confirm Password</div><input type="password" class="td-input" id="pw-confirm" placeholder="Re-enter password" autocomplete="new-password"/></div>
    </div>
    <div style="padding:12px 20px 18px;border-top:1px solid #f3f4f6;display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn-cancel-secondary" onclick="closePwModal()">Cancel</button>
      <button class="btn-save-primary" id="pw-save-btn">Save Password</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);
let currentUser, allUsers = [], currentView = 'all', activeMemberId = null;
let pwTargetId = null;
const ALL_MODULES = ['time_ticket','get_po','office_dashboard','timesheet_edit','time_off_approve','receive_emails','safety_forms','safety_supervisor'];
const MODULE_LABELS = {
  time_ticket: 'Time Tickets', get_po: 'Get PO', office_dashboard: 'Office Dashboard',
  timesheet_edit: 'Timesheet Edit', time_off_approve: 'Time Off Approval',
  receive_emails: 'Email Notifications', safety_forms: 'Safety Forms',
  safety_supervisor: 'Safety Supervisor (incident & near-miss reports)'
};

function showToast(msg, type='') { const t=$('toast'); t.textContent=msg; t.className=`show ${type}`; setTimeout(()=>t.className='',3200); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function avatarBg(name) {
  const colors = ['#ea580c','#2563eb','#16a34a','#7c3aed','#0891b2','#b45309','#be185d','#0f766e'];
  let h=0; for(let c of (name||'')) h=(h*31+c.charCodeAt(0))&0xffff; return colors[h%colors.length];
}

// ── Auth ──
(async () => {
  const r = await fetch('/api/auth/me');
  if (!r.ok) { location.href='/login.html'; return; }
  currentUser = await r.json();
  if (currentUser.role !== 'admin') { location.href='/field.html'; return; }
  document.body.style.visibility='visible';
  loadUsers();
  buildInvitePermsGrid();
})();

$('logout-btn').addEventListener('click', async e => {
  e.preventDefault(); await fetch('/api/auth/logout',{method:'POST'}); location.href='/login.html';
});

// ── Data ──
async function loadUsers() {
  const res = await fetch('/api/users');
  allUsers = await res.json();
  updateCounts();
  renderCards();
}

function updateCounts() {
  const admin = allUsers.filter(u=>u.role==='admin').length;
  const field = allUsers.filter(u=>u.role!=='admin').length;
  const pending = allUsers.filter(u=>u.status==='invited').length;
  $('cnt-all').textContent = allUsers.length;
  $('cnt-admin').textContent = admin;
  $('cnt-field').textContent = field;
  $('cnt-pending').textContent = pending;
}

// ── Views ──
const VIEW_TITLES = { all: 'All Members', admin: 'Office Admins', field: 'Field Users', pending: 'Pending Invites' };
function setView(v, tabEl) {
  currentView = v;
  // Sidebar buttons
  ['all','admin','field','pending'].forEach(x => {
    const b = $('nav-'+x); if (b) b.classList.toggle('active', x===v);
  });
  // Mobile tab pills
  document.querySelectorAll('.tm-tab-pill').forEach(p => p.classList.remove('active'));
  if (tabEl) tabEl.classList.add('active');
  $('main-view-title').textContent = VIEW_TITLES[v];
  $('tm-search').value = '';
  renderCards();
}

// Show mobile FAB when sidebar is hidden
function updateFABVisibility() {
  const fab = $('btn-open-invite-fab');
  if (fab) fab.style.display = window.innerWidth <= 700 ? 'flex' : 'none';
}
window.addEventListener('resize', updateFABVisibility);
window.addEventListener('DOMContentLoaded', updateFABVisibility);

function filterUsers() {
  const q = ($('tm-search').value||'').toLowerCase();
  let users = allUsers;
  if (currentView === 'admin')   users = users.filter(u=>u.role==='admin');
  if (currentView === 'field')   users = users.filter(u=>u.role!=='admin');
  if (currentView === 'pending') users = users.filter(u=>u.status==='invited');
  if (q) users = users.filter(u=>(u.name+' '+u.email).toLowerCase().includes(q));
  return users;
}

function renderCards() {
  const users = filterUsers();
  const wrap = $('tm-cards');
  $('tm-empty').style.display = users.length ? 'none' : 'block';
  wrap.innerHTML = users.map(u => {
    const bg = u.time_off_color || avatarBg(u.name);
    const isMe = u.id === currentUser.id;
    return `<div class="tm-card${activeMemberId===u.id?' selected':''}" onclick="openMemberDrawer(${u.id})">
      ${isMe ? `<div class="tm-card-me">You</div>` : ''}
      <div class="tm-card-top">
        <div class="tm-avatar" style="background:${bg};">${esc(initials(u.name))}</div>
        <div>
          <div class="tm-card-name">${esc(u.name)}</div>
          <div class="tm-card-email">${esc(u.email)}</div>
        </div>
      </div>
      <div class="tm-card-footer">
        <span class="role-pill role-${u.role}">${u.role==='admin'?'Office Admin':'Field User'}</span>
        <span class="status-pill status-${u.status}">${u.status}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Member drawer ──
function openMemberDrawer(uid) {
  const u = allUsers.find(x=>x.id===uid);
  if (!u) return;
  activeMemberId = uid;
  renderCards();

  const bg = u.time_off_color || avatarBg(u.name);
  $('md-avatar').textContent = initials(u.name);
  $('md-avatar').style.background = bg;
  $('md-name').textContent = u.name;
  $('md-email').textContent = u.email;

  switchDTab('profile');
  $('member-overlay').classList.add('open');
  $('member-drawer').classList.add('open');
}

function closeMemberDrawer() {
  activeMemberId = null;
  renderCards();
  $('member-overlay').classList.remove('open');
  $('member-drawer').classList.remove('open');
}

let _activeTab = 'profile';
function switchDTab(tab) {
  _activeTab = tab;
  ['profile','perms','actions'].forEach(t => {
    $('dtab-'+t).classList.toggle('active', t===tab);
  });
  const u = allUsers.find(x=>x.id===activeMemberId);
  if (!u) return;
  const isMe = u.id === currentUser.id;
  const body = $('md-body');
  const footer = $('md-footer');

  if (tab === 'profile') {
    body.innerHTML = `
      <div class="warn-box" id="md-warn"></div>
      <div class="td-row"><div class="td-label">Full Name</div><input type="text" class="td-input" id="md-inp-name" value="${esc(u.name)}"${isMe?'':''}/></div>
      <div class="td-row"><div class="td-label">Email</div><input type="email" class="td-input" id="md-inp-email" value="${esc(u.email)}" readonly style="background:#f9fafb;color:#6b7280;cursor:default;" title="Email cannot be changed"/></div>
      ${!isMe ? `<div class="td-row"><div class="td-label">Role</div>
        <select class="td-select" id="md-inp-role">
          <option value="field"${u.role!=='admin'?' selected':''}>Field User</option>
          <option value="admin"${u.role==='admin'?' selected':''}>Office Admin</option>
        </select></div>` : `<div class="td-row"><div class="td-label">Role</div><div style="padding:9px 12px;background:#f9fafb;border-radius:8px;font-size:13px;font-weight:700;color:#6b7280;">${u.role==='admin'?'Office Admin':'Field User'} <span style="font-size:11px;font-weight:400;">(your account)</span></div></div>`}
      <div class="td-section-title">Calendar Colour</div>
      <div class="color-swatch-wrap">
        <input type="color" class="color-swatch" id="md-color" value="${esc(u.time_off_color||'#93c5fd')}" title="Calendar colour"/>
        <div>
          <div style="font-size:13px;font-weight:600;color:#374151;">Time-off calendar colour</div>
          <div style="font-size:11px;color:#6b7280;">Shown on the team schedule</div>
        </div>
      </div>
      <div class="td-section-title">Status</div>
      <div style="padding:10px 12px;background:#f9fafb;border-radius:8px;">
        <span class="status-pill status-${u.status}" style="font-size:12px;">${u.status}</span>
        <span style="font-size:12px;color:#6b7280;margin-left:8px;">Last login: ${u.last_login ? new Date(u.last_login).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}) : 'Never'}</span>
      </div>`;

    footer.innerHTML = !isMe
      ? `<button class="btn-save-primary" id="md-save-profile">Save Changes</button>
         <button class="btn-cancel-secondary" onclick="closeMemberDrawer()">Cancel</button>`
      : `<button class="btn-save-primary" id="md-save-profile">Save Name</button>`;

    $('md-inp-name').focus();
    $('md-color').addEventListener('change', async e => {
      const r = await fetch(`/api/users/${u.id}/color`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({color:e.target.value})});
      if (r.ok) showToast('Color saved','success'); else showToast('Failed to save color','error');
    });

    $('md-save-profile').addEventListener('click', async () => {
      const name = $('md-inp-name').value.trim();
      const role = isMe ? u.role : ($('md-inp-role')||{value:u.role}).value;
      if (!name) { showWarn('md-warn','Name is required'); return; }
      $('md-save-profile').disabled=true; $('md-save-profile').textContent='Saving…';
      const r = await fetch(`/api/users/${u.id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,role})});
      const d = await r.json();
      $('md-save-profile').disabled=false; $('md-save-profile').textContent='Save Changes';
      if (!r.ok) { showWarn('md-warn', d.error||'Failed'); return; }
      showToast('Profile updated','success');
      await loadUsers();
      // refresh drawer header
      $('md-name').textContent = name;
    });
  }

  if (tab === 'perms') {
    const perms = (u.permissions||'').split(',').filter(Boolean);
    const isAdmin = u.role === 'admin';
    body.innerHTML = `
      <p style="font-size:12px;color:#6b7280;margin:0 0 14px;">${isAdmin ? 'Admins have access to all modules. You can still adjust optional extras below.' : 'Toggle which modules this user can access.'}</p>
      <div class="perm-grid" id="md-perm-grid">
        ${ALL_MODULES.map(mod => {
          const checked = isAdmin || perms.includes(mod);
          const locked = isAdmin && mod==='office_dashboard';
          return `<div class="perm-row">
            <div class="perm-row-name">${MODULE_LABELS[mod]}</div>
            <label class="perm-toggle" title="${locked?'Admins always have this':''}">
              <input type="checkbox" class="md-perm-cb" data-perm="${mod}" ${checked?'checked':''} ${locked?'disabled':''} ${!isMe||mod!=='office_dashboard'?'':'disabled'}>
              <div class="perm-toggle-track"></div>
              <div class="perm-toggle-thumb"></div>
            </label>
          </div>`;
        }).join('')}
      </div>`;
    footer.innerHTML = `<button class="btn-save-primary" id="md-save-perms">Save Permissions</button>
      <button class="btn-cancel-secondary" onclick="closeMemberDrawer()">Cancel</button>`;

    $('md-save-perms').addEventListener('click', async () => {
      const permsNew = Array.from($('md-perm-grid').querySelectorAll('.md-perm-cb:checked')).map(c=>c.dataset.perm);
      $('md-save-perms').disabled=true; $('md-save-perms').textContent='Saving…';
      const r = await fetch(`/api/users/${u.id}/permissions`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({permissions:permsNew})});
      $('md-save-perms').disabled=false; $('md-save-perms').textContent='Save Permissions';
      if (r.ok) { showToast('Permissions saved','success'); await loadUsers(); }
      else showToast('Failed to save permissions','error');
    });
  }

  if (tab === 'actions') {
    const isActive = u.status === 'active';
    body.innerHTML = `
      <div class="action-item">
        <div class="action-item-info">
          <div class="action-item-title">Reset Password</div>
          <div class="action-item-desc">Set a new temporary password manually</div>
        </div>
        <button class="action-btn action-btn-gray" onclick="openPwModal(${u.id},'${esc(u.name)}')">Reset</button>
      </div>
      <div class="action-item">
        <div class="action-item-info">
          <div class="action-item-title">Send Reset Link</div>
          <div class="action-item-desc">Email a password reset link to ${esc(u.email)}</div>
        </div>
        <button class="action-btn action-btn-orange" onclick="doSendResetLink(${u.id},'${esc(u.name)}')">Send</button>
      </div>
      ${!isMe ? `
      <div class="action-item">
        <div class="action-item-info">
          <div class="action-item-title">${isActive ? 'Deactivate Account' : 'Reactivate Account'}</div>
          <div class="action-item-desc">${isActive ? 'Block this user from logging in' : 'Restore login access'}</div>
        </div>
        <button class="action-btn ${isActive?'action-btn-red':'action-btn-green'}" onclick="${isActive?`doDeactivate(${u.id},'${esc(u.name)}')`:`doReactivate(${u.id})`}">${isActive?'Deactivate':'Reactivate'}</button>
      </div>
      <div class="action-item" style="border:1px solid #fecaca;background:#fef2f2;">
        <div class="action-item-info">
          <div class="action-item-title" style="color:#dc2626;">Remove Member</div>
          <div class="action-item-desc">Permanently delete this account — cannot be undone</div>
        </div>
        <button class="action-btn action-btn-red" onclick="doRemove(${u.id},'${esc(u.name)}')">Remove</button>
      </div>` : `<div style="text-align:center;padding:24px;color:#6b7280;font-size:13px;">These actions are not available for your own account.</div>`}`;
    footer.innerHTML = '';
  }
}

function showWarn(id, msg) { const el=$(id); if(!el)return; el.textContent=msg; el.style.display='block'; }

// ── User actions ──
async function doDeactivate(id,name) {
  if (!confirm(`Deactivate ${name}? They will not be able to log in.`)) return;
  const r=await fetch(`/api/users/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'inactive'})});
  if (r.ok) { showToast('User deactivated','success'); await loadUsers(); switchDTab('actions'); }
}
async function doReactivate(id) {
  const r=await fetch(`/api/users/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'active'})});
  if (r.ok) { showToast('User reactivated','success'); await loadUsers(); switchDTab('actions'); }
}
async function doRemove(id,name) {
  if (!confirm(`Permanently remove ${name}? This cannot be undone.`)) return;
  const r=await fetch(`/api/users/${id}`,{method:'DELETE'});
  if (r.ok) { showToast('User removed','success'); closeMemberDrawer(); await loadUsers(); }
}
async function doSendResetLink(id,name) {
  const res=await fetch(`/api/users/${id}/send-reset-link`,{method:'POST'});
  const data=await res.json();
  if (!res.ok) { showToast(data.error||'Failed','error'); return; }
  if (data.email_sent) { showToast(`Reset email sent to ${name}`,'success'); return; }
  const copied=await navigator.clipboard.writeText(data.reset_url).then(()=>true).catch(()=>false);
  showToast(copied?'Reset link copied!':'Check console for link','success');
  if (!copied) console.info('Reset link:',data.reset_url);
}

// ── Password modal ──
function openPwModal(id,name) {
  pwTargetId=id; $('pw-modal-name').textContent=name;
  $('pw-new').value=''; $('pw-confirm').value='';
  $('pw-warn').style.display='none'; $('pw-save-btn').disabled=false; $('pw-save-btn').textContent='Save Password';
  $('pw-overlay').classList.add('open');
  $('pw-modal').style.display='block';
  setTimeout(()=>{ $('pw-modal').style.transform='scale(1)'; $('pw-new').focus(); },10);
}
function closePwModal() {
  $('pw-overlay').classList.remove('open');
  $('pw-modal').style.transform='scale(.95)';
  setTimeout(()=>{ $('pw-modal').style.display='none'; },180);
  pwTargetId=null;
}
$('pw-save-btn').addEventListener('click', async () => {
  const pw=$('pw-new').value, cf=$('pw-confirm').value;
  $('pw-warn').style.display='none';
  if (!pw||pw.length<8) { $('pw-warn').textContent='Password must be at least 8 characters.'; $('pw-warn').style.display='block'; return; }
  if (pw!==cf) { $('pw-warn').textContent='Passwords do not match.'; $('pw-warn').style.display='block'; return; }
  $('pw-save-btn').disabled=true; $('pw-save-btn').textContent='Saving…';
  const res=await fetch(`/api/users/${pwTargetId}/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const data=await res.json();
  if (res.ok) { closePwModal(); showToast('Password updated','success'); }
  else { $('pw-warn').textContent=data.error||'Failed.'; $('pw-warn').style.display='block'; $('pw-save-btn').disabled=false; $('pw-save-btn').textContent='Save Password'; }
});

// ── Invite drawer ──
function buildInvitePermsGrid() {
  $('inv-perms-grid').innerHTML = ALL_MODULES.map(mod => `
    <div class="perm-row">
      <div class="perm-row-name">${MODULE_LABELS[mod]}</div>
      <label class="perm-toggle">
        <input type="checkbox" class="inv-perm-cb" data-perm="${mod}">
        <div class="perm-toggle-track"></div>
        <div class="perm-toggle-thumb"></div>
      </label>
    </div>`).join('');

  // Auto-set perms when role changes
  $('inv-role').addEventListener('change', () => {
    const isAdmin = $('inv-role').value === 'admin';
    $('inv-perms-grid').querySelectorAll('.inv-perm-cb').forEach(cb => {
      if (isAdmin) cb.checked=true;
    });
  });
}

function openInviteDrawer() {
  $('inv-name').value=''; $('inv-email').value='';
  $('inv-role').value='field';
  $('inv-warn').style.display='none'; $('inv-result').style.display='none';
  $('inv-perms-grid').querySelectorAll('.inv-perm-cb').forEach(cb=>cb.checked=false);
  $('invite-overlay').classList.add('open');
  $('invite-drawer').classList.add('open');
  setTimeout(()=>$('inv-name').focus(),200);
}
function closeInviteDrawer() {
  $('invite-overlay').classList.remove('open');
  $('invite-drawer').classList.remove('open');
}
$('btn-open-invite').addEventListener('click', openInviteDrawer);

function copyInviteLink() {
  navigator.clipboard.writeText($('inv-url').textContent).then(()=>showToast('Link copied!','success'));
}

$('btn-do-invite').addEventListener('click', async () => {
  const name=$('inv-name').value.trim(), email=$('inv-email').value.trim(), role=$('inv-role').value;
  if (!name||!email) { showWarn('inv-warn','Name and email are required'); return; }
  const perms = Array.from($('inv-perms-grid').querySelectorAll('.inv-perm-cb:checked')).map(c=>c.dataset.perm);
  $('btn-do-invite').disabled=true; $('btn-do-invite').textContent='Sending…';
  const res=await fetch('/api/users/invite',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,role,permissions:perms})});
  const data=await res.json();
  $('btn-do-invite').disabled=false; $('btn-do-invite').textContent='Send Invitation';
  if (!res.ok) { showWarn('inv-warn',data.error||'Failed'); return; }
  $('inv-url').textContent=data.invite_url;
  $('inv-result').style.display='block';
  $('inv-name').value=''; $('inv-email').value='';
  if (data.email_sent) showToast('Invitation email sent!','success');
  else showToast('User invited — share the link','');
  loadUsers();
});

document.addEventListener('keydown', e => { if(e.key==='Escape') { closeMemberDrawer(); closeInviteDrawer(); closePwModal(); }});
</script>
</body>
</html>

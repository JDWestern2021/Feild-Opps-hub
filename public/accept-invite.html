<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Field Ops"/>
  <meta name="theme-color" content="#111111"/>
  <title>Accept Invitation — J&D Western Electric</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="theme.css"/>
  <style>
    body { background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .bg-slash { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .bg-slash::after { content: ''; position: absolute; top: -10%; right: 0; width: 40%; height: 130%; background: linear-gradient(160deg, #F47920 0%, #c1380a 60%, #8c2a08 100%); clip-path: polygon(40% 0%, 100% 0%, 100% 100%, 8% 100%); opacity: 0.15; }

    .wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand img { width: 70px; height: 70px; object-fit: contain; background: white; border-radius: 14px; padding: 7px; }
    .brand h1 { color: #fff; font-size: 17px; font-weight: 900; margin-top: 12px; text-transform: uppercase; }

    .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 28px; }
    .card h2 { color: #fff; font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .card .sub { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 8px; color: #fff; font-size: 15px; transition: border-color .15s; }
    .form-control:focus { outline: none; border-color: var(--orange, #F47920); }
    .btn-submit { width: 100%; padding: 14px; background: var(--orange, #F47920); color: #000; font-size: 15px; font-weight: 900; text-transform: uppercase; letter-spacing: .06em; border: none; border-radius: 8px; cursor: pointer; margin-top: 8px; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .error-msg { background: rgba(217,52,43,.15); border: 1px solid rgba(217,52,43,.3); color: #f87171; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
    .pw-hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px; }
    #invalid-state { text-align: center; padding: 32px 0; }
    #invalid-state h3 { color: #f87171; font-size: 18px; }
    #invalid-state p { color: rgba(255,255,255,0.4); margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body>
<div class="bg-slash"></div>
<div class="wrap">
  <div class="brand">
    <img src="logo-bolt.png" alt="J&D Western Electric"/>
    <h1>J&D Western Electric</h1>
  </div>
  <div class="card">
    <div id="invalid-state" style="display:none;">
      <h3>Invalid or Expired Link</h3>
      <p>This invitation link is no longer valid. Please ask your admin to send a new invite.</p>
    </div>
    <div id="form-state">
      <h2>Activate Your Account</h2>
      <p class="sub">Set your name and password to get started.</p>
      <div class="error-msg" id="err" style="display:none;"></div>
      <form id="accept-form">
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" id="name" class="form-control" placeholder="Full name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="email" class="form-control" readonly style="opacity:.5;"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 8 characters" required minlength="8"/>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm" class="form-control" placeholder="Re-enter password" required/>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Activate Account</button>
      </form>
    </div>
  </div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) { document.getElementById('invalid-state').style.display = 'block'; document.getElementById('form-state').style.display = 'none'; }
else {
  fetch('/api/auth/invite/' + token).then(async r => {
    if (!r.ok) { document.getElementById('invalid-state').style.display = 'block'; document.getElementById('form-state').style.display = 'none'; return; }
    const u = await r.json();
    document.getElementById('name').value  = u.name;
    document.getElementById('email').value = u.email;
  });
}

document.getElementById('accept-form')?.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('err');
  const pw  = document.getElementById('password').value;
  const cf  = document.getElementById('confirm').value;
  err.style.display = 'none';
  if (pw !== cf) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Activating…';
  const res = await fetch('/api/auth/invite/' + token + '/accept', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: document.getElementById('name').value, password: pw })
  });
  const data = await res.json();
  if (res.ok) { location.href = data.role === 'admin' ? '/office.html' : '/field.html'; }
  else { err.textContent = data.error; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Activate Account'; }
});
</script>
</body>
</html>

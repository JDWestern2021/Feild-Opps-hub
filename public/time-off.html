<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="apple-mobile-web-app-title" content="Field Ops"/>
  <meta name="theme-color" content="#111111"/>
  <title>Time Off — J&D Western Electric</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="theme.css"/>
  <style>
    body { visibility: hidden; background: var(--gray-100); }
    .page-container { max-width: 700px; margin: 0 auto; padding: 20px 16px 60px; }

    /* Tabs */
    .view-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 6px; }
    .view-tab { flex: 1; padding: 9px 4px; border: none; background: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--gray-500); transition: all .15s; }
    .view-tab.active { background: var(--orange); color: white; }

    /* Calendar */
    .cal-wrap { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--dark); color: white; }
    .cal-header h2 { font-size: 15px; font-weight: 700; }
    .cal-nav { background: none; border: 1px solid rgba(255,255,255,.3); color: white; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 16px; font-weight: 700; }
    .cal-nav:hover { background: rgba(255,255,255,.1); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-dow { text-align: center; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--gray-500); padding: 10px 2px 6px; }
    .cal-cell { min-height: 64px; padding: 4px 5px; border-top: 1px solid var(--gray-100); border-right: 1px solid var(--gray-100); position: relative; }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.other-month .cal-num { color: var(--gray-300); }
    .cal-cell.today { background: #fff8f0; }
    .cal-cell.today .cal-num { background: var(--orange); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
    .cal-num { font-size: 12px; font-weight: 600; color: var(--dark); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
    .cal-stat { font-size: 9px; font-weight: 800; color: #1a6e35; background: #d4edda; border-radius: 3px; padding: 1px 4px; margin-top: 2px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-event { font-size: 9px; font-weight: 700; border-radius: 3px; padding: 2px 4px; margin-top: 2px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .cal-event.pending { background: repeating-linear-gradient(45deg, #f8f9fa, #f8f9fa 2px, #dee2e6 2px, #dee2e6 4px); border: 1px solid #ced4da; }
    .cal-event.mine { outline: 2px solid var(--orange); outline-offset: -1px; }

    /* Legend */
    .cal-legend { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 10px 14px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Request form — FIXED mobile date inputs */
    .req-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .req-header { background: linear-gradient(135deg, var(--black) 60%, var(--orange) 100%); color: white; padding: 18px 20px; }
    .req-header h1 { font-size: 17px; font-weight: 800; }
    .req-header .sub { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 2px; }
    .req-body { padding: 20px; }

    /* Date grid: each field takes full width on narrow screens */
    .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) {
      .date-grid { grid-template-columns: 1fr; }
    }
    /* Ensure date inputs never overflow their container */
    input[type="date"].form-control {
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    /* My requests list */
    .req-item { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; }
    .req-type-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; background: var(--gray-300); }
    .req-info { flex: 1; min-width: 0; }
    .req-dates { font-size: 14px; font-weight: 700; }
    .req-meta  { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .req-status { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
    .req-status.pending  { background: #fff3cd; color: #856404; }
    .req-status.approved { background: #d4edda; color: #155724; }
    .req-status.denied   { background: #f8d7da; color: #721c24; }
    .req-status.cancelled{ background: var(--gray-100); color: var(--gray-500); }
    .cancel-btn { background: none; border: 1px solid var(--gray-300); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--gray-500); margin-top: 6px; }
    .cancel-btn:hover { border-color: var(--red); color: var(--red); }
    .edit-btn { background: none; border: 1px solid var(--orange); border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; color: var(--orange); margin-top: 6px; }
    .edit-btn:hover { background: var(--orange); color: white; }
    .delete-btn { background: none; border: 1px solid #dc3545; border-radius: 6px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; color: #dc3545; margin-top: 6px; }
    .delete-btn:hover { background: #dc3545; color: white; }

    /* Swipe-to-delete for cancelled/denied */
    .req-item { position: relative; overflow: hidden; touch-action: pan-y; }
    .req-item .swipe-delete-bg {
      position: absolute; right: 0; top: 0; bottom: 0; width: 80px;
      background: #dc3545; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; font-weight: 700; transform: translateX(100%);
      transition: transform .2s; border-radius: 0 var(--radius) var(--radius) 0;
    }
    .req-item.swipe-reveal .swipe-delete-bg { transform: translateX(0); }
    .req-item.deleting { animation: slideOut .3s ease forwards; }
    @keyframes slideOut { to { transform: translateX(-100%); opacity: 0; max-height: 0; margin: 0; padding: 0; } }

    /* Edit modal */
    .edit-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .edit-modal { background: white; border-radius: 16px 16px 0 0; padding: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .edit-modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
    @media (min-width: 600px) {
      .edit-modal-overlay { align-items: center; }
      .edit-modal { border-radius: 16px; max-height: 80vh; }
    }

    /* Notification banner */
    .notif-banner { background: #d4edda; border: 1px solid #b8ddc8; border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #155724; cursor: pointer; }
    .notif-banner:hover { background: #c3e6cb; }

    /* Event detail popup */
    .event-popup { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; border-radius: 12px; padding: 14px 18px; z-index: 300; max-width: 320px; width: calc(100% - 32px); box-shadow: 0 8px 32px rgba(0,0,0,.3); font-size: 13px; display: none; }
    .event-popup.show { display: block; }
    .event-popup .ep-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: rgba(255,255,255,.5); font-size: 18px; cursor: pointer; }
    .event-popup strong { color: var(--orange); }

    /* Filter bar */
    .cal-filter { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 10px 14px; margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 13px; }
    .cal-filter label { font-weight: 600; color: var(--gray-700); white-space: nowrap; }
    .cal-filter select { padding: 5px 8px; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 13px; background: white; color: var(--dark); }

    .empty-notice { text-align: center; padding: 40px 20px; color: var(--gray-500); font-size: 14px; }

    @media (max-width: 480px) {
      .cal-cell { min-height: 52px; padding: 3px 2px; }
      .cal-event { font-size: 8px; padding: 1px 2px; }
      .cal-stat  { font-size: 8px; }
      .cal-legend { display: none; } /* hide on very small screens to save space */
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-brand">
    <a href="index.html"><img class="header-logo" src="logo-bolt.png" alt="J&D Western Electric"/></a>
    <div class="header-title">
      <span class="company">J&D Western Electric</span>
      <span class="module">Time Off</span>
    </div>
  </div>
  <nav class="header-nav" style="display:flex;gap:4px;align-items:center;">
    <a href="index.html">← Hub</a>
    <a href="#" id="logout-btn">Sign Out</a>
  </nav>
</header>

<div class="page-container">

  <!-- Notification banner (shown when there are unread approved/denied) -->
  <div id="notif-banner" class="notif-banner" style="display:none;" onclick="dismissNotif()">
    <span style="font-size:18px;">🔔</span>
    <span id="notif-text"></span>
    <span style="margin-left:auto;font-size:11px;opacity:.7;">Tap to dismiss</span>
  </div>

  <!-- View tabs -->
  <div class="view-tabs">
    <button class="view-tab active" id="tab-calendar" onclick="showTab('calendar')">📅 Calendar</button>
    <button class="view-tab" id="tab-request"  onclick="showTab('request')">+ New Request</button>
    <button class="view-tab" id="tab-my"        onclick="showTab('my')">My Requests</button>
  </div>

  <!-- CALENDAR VIEW -->
  <div id="view-calendar">
    <div class="cal-filter">
      <label>Person:</label>
      <select id="cf-person"><option value="">Everyone</option></select>
    </div>
    <div id="cal-legend" class="cal-legend"></div>
    <!-- Loading / error states -->
    <div id="cal-loading" style="display:none;text-align:center;padding:48px 20px;color:var(--gray-500);">
      <div style="width:32px;height:32px;border:3px solid var(--gray-300);border-top-color:var(--orange);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;"></div>
      <div style="font-size:13px;">Loading calendar…</div>
    </div>
    <div id="cal-error" style="display:none;text-align:center;padding:40px 20px;">
      <div style="font-size:32px;margin-bottom:8px;">⚠️</div>
      <div style="font-size:14px;font-weight:600;color:var(--gray-700);margin-bottom:4px;">Could not load calendar</div>
      <div id="cal-error-msg" style="font-size:13px;color:var(--gray-500);margin-bottom:16px;"></div>
      <button class="btn btn-sm" style="background:var(--orange);color:white;" onclick="reloadCalendar()">Retry</button>
    </div>
    <div id="cal-wrap-inner" class="cal-wrap">
      <div class="cal-header">
        <button class="cal-nav" id="cal-prev">‹</button>
        <h2 id="cal-title"></h2>
        <button class="cal-nav" id="cal-next">›</button>
      </div>
      <div class="cal-grid" id="cal-grid">
        <div class="cal-dow">Sun</div><div class="cal-dow">Mon</div><div class="cal-dow">Tue</div>
        <div class="cal-dow">Wed</div><div class="cal-dow">Thu</div><div class="cal-dow">Fri</div><div class="cal-dow">Sat</div>
      </div>
    </div>
  </div>

  <!-- REQUEST FORM -->
  <div id="view-request" style="display:none;">
    <div class="req-card">
      <div class="req-header">
        <h1>New Time Off Request</h1>
        <div class="sub">Requests go to the office for approval</div>
      </div>
      <div class="req-body">
        <div class="form-group">
          <label class="form-label">Type <span class="required">*</span></label>
          <select id="to-type" class="form-control">
            <option value="Vacation">Vacation</option>
            <option value="Sick">Sick</option>
            <option value="Unpaid">Unpaid</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="date-grid mt-12">
          <div class="form-group">
            <label class="form-label">First Day Off <span class="required">*</span></label>
            <input type="date" id="to-start" class="form-control"/>
          </div>
          <div class="form-group">
            <label class="form-label">Last Day Off <span class="required">*</span></label>
            <input type="date" id="to-end" class="form-control"/>
          </div>
        </div>
        <div class="form-group mt-12">
          <label class="form-label">Return to Work Date <span class="required">*</span></label>
          <input type="date" id="to-rtw" class="form-control"/>
          <span class="form-hint">The first day you'll be back — auto-filled, adjust if needed</span>
        </div>
        <div class="form-group mt-12">
          <label class="form-label">Half Day</label>
          <select id="to-halfday" class="form-control">
            <option value="">Full Day(s)</option>
            <option value="morning">Morning (AM) only</option>
            <option value="afternoon">Afternoon (PM) only</option>
          </select>
        </div>
        <div class="form-group mt-12">
          <label class="form-label">Note <span style="font-weight:400;color:var(--gray-500);">(optional)</span></label>
          <textarea id="to-note" class="form-control" rows="3" placeholder="Reason or details…"></textarea>
        </div>
        <div id="overlap-warning" style="display:none; background:#fff3cd; border:1px solid #ffc107; border-radius:8px; padding:10px 14px; margin-top:12px; font-size:13px; color:#856404;"></div>
        <div id="req-error" style="display:none; background:#f8d7da; border-radius:8px; padding:10px 14px; margin-top:12px; font-size:13px; color:#721c24;"></div>
        <button class="btn btn-primary btn-lg mt-16" id="btn-submit-req">Submit Request</button>
      </div>
    </div>
  </div>

  <!-- MY REQUESTS -->
  <div id="view-my" style="display:none;">
    <div id="my-req-list"><div class="empty-notice">Loading…</div></div>
  </div>

</div>

<!-- Edit Request Modal -->
<div id="edit-modal-overlay" class="edit-modal-overlay" style="display:none;" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3>Edit Request</h3>
      <button onclick="closeEditModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-400);">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Type</label>
      <select id="edit-type" class="form-control">
        <option value="Vacation">Vacation</option>
        <option value="Sick">Sick</option>
        <option value="Unpaid">Unpaid</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="date-grid mt-12">
      <div class="form-group">
        <label class="form-label">First Day Off</label>
        <input type="date" id="edit-start" class="form-control"/>
      </div>
      <div class="form-group">
        <label class="form-label">Last Day Off</label>
        <input type="date" id="edit-end" class="form-control"/>
      </div>
    </div>
    <div class="form-group mt-12">
      <label class="form-label">Return to Work Date</label>
      <input type="date" id="edit-rtw" class="form-control"/>
    </div>
    <div class="form-group mt-12">
      <label class="form-label">Half Day</label>
      <select id="edit-halfday" class="form-control">
        <option value="">Full Day(s)</option>
        <option value="morning">Morning (AM) only</option>
        <option value="afternoon">Afternoon (PM) only</option>
      </select>
    </div>
    <div class="form-group mt-12">
      <label class="form-label">Note <span style="font-weight:400;color:var(--gray-500);">(optional)</span></label>
      <textarea id="edit-note" class="form-control" rows="2" placeholder="Reason or details…"></textarea>
    </div>
    <div id="edit-error" style="display:none;background:#f8d7da;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;color:#721c24;"></div>
    <div style="font-size:12px;color:var(--gray-500);margin-top:10px;" id="edit-resubmit-note"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-primary" id="btn-save-edit" style="flex:1;">Save &amp; Re-submit</button>
      <button class="btn btn-secondary" onclick="closeEditModal()" style="flex:1;">Cancel</button>
    </div>
  </div>
</div>

<!-- Event detail popup -->
<div class="event-popup" id="event-popup">
  <button class="ep-close" onclick="closeEventPopup()">×</button>
  <div id="event-popup-content"></div>
</div>

<div id="toast"></div>

<script>
const $ = id => document.getElementById(id);

// Per-user colour palette — deterministic by user_id
const USER_PALETTE = [
  {bg:'#dbeafe',text:'#1e40af',border:'#93c5fd'}, // blue
  {bg:'#ede9fe',text:'#5b21b6',border:'#c4b5fd'}, // purple
  {bg:'#fce7f3',text:'#9d174d',border:'#f9a8d4'}, // pink
  {bg:'#d1fae5',text:'#065f46',border:'#6ee7b7'}, // green
  {bg:'#fef3c7',text:'#92400e',border:'#fcd34d'}, // amber
  {bg:'#fee2e2',text:'#991b1b',border:'#fca5a5'}, // red
  {bg:'#cffafe',text:'#155e75',border:'#67e8f9'}, // cyan
  {bg:'#ecfccb',text:'#365314',border:'#bef264'}, // lime
  {bg:'#f3e8ff',text:'#6b21a8',border:'#d8b4fe'}, // violet
  {bg:'#ffedd5',text:'#9a3412',border:'#fdba74'}, // orange
  {bg:'#ccfbf1',text:'#134e4a',border:'#5eead4'}, // teal
  {bg:'#fef9c3',text:'#713f12',border:'#fde047'}, // yellow
];
function hexToUserColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return {
    bg: `rgba(${r},${g},${b},0.15)`,
    text: lum > 0.65 ? `rgb(${Math.round(r*0.35)},${Math.round(g*0.35)},${Math.round(b*0.35)})` : hex,
    border: hex
  };
}
function userColor(userId, hexOverride) {
  if (hexOverride) return hexToUserColor(hexOverride);
  return USER_PALETTE[Math.abs(parseInt(userId) || 0) % USER_PALETTE.length];
}

let currentUser = null;
let calEvents = [];
let statHolidays = {};
let calYear  = new Date().getFullYear();
// Simple client-side cache: skip refetch when month/year hasn't changed
let _calCache = {};   // key → { events, holidays, ts }
const CAL_CACHE_TTL = 5 * 60 * 1000; // 5 minutes
let calMonth = new Date().getMonth();

// ── Auth ──
(async () => {
  const r = await fetch('/api/auth/me');
  if (!r.ok) { location.href = '/login.html'; return; }
  currentUser = await r.json();
  document.body.style.visibility = 'visible';

  $('logout-btn').addEventListener('click', async e => {
    e.preventDefault();
    await fetch('/api/auth/logout', {method:'POST'});
    location.href = '/login.html';
  });

  // Default dates: tomorrow → +7 days, RTW = end+1
  const t1 = new Date(); t1.setDate(t1.getDate() + 1);
  const t2 = new Date(); t2.setDate(t2.getDate() + 7);
  const t3 = new Date(); t3.setDate(t3.getDate() + 8);
  $('to-start').value = t1.toISOString().slice(0,10);
  $('to-end').value   = t2.toISOString().slice(0,10);
  $('to-rtw').value   = t3.toISOString().slice(0,10);

  // Mark this page visited — clear notification
  markNotificationsRead();
  checkNotifications();

  await loadCalendarData();
  showTab('calendar');   // explicitly activate calendar tab so it's always visible on load
  loadPersonFilter();
})();

function showToast(msg, type='') {
  const t = $('toast'); t.textContent = msg; t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3200);
}

function showTab(tab) {
  ['calendar','request','my'].forEach(t => {
    $(`view-${t}`).style.display = t === tab ? '' : 'none';
    $(`tab-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'my') loadMyRequests();
  if (tab === 'calendar') renderCalendar();
}

// ── Notifications ──
function getSeenIds() {
  try { return JSON.parse(localStorage.getItem('to_seen_ids') || '[]'); } catch { return []; }
}
function markNotificationsRead() {
  // Will be set after we load notifications
}
async function checkNotifications() {
  const r = await fetch('/api/time-off/my-notifications');
  if (!r.ok) return;
  const all = await r.json();
  const seen = getSeenIds();
  const unseen = all.filter(n => !seen.includes(n.id));
  if (!unseen.length) return;
  const approved = unseen.filter(n => n.status === 'approved');
  const denied   = unseen.filter(n => n.status === 'denied');
  const parts = [];
  if (approved.length) parts.push(`${approved.length} request${approved.length>1?'s':''} approved ✓`);
  if (denied.length)   parts.push(`${denied.length} request${denied.length>1?'s':''} denied`);
  $('notif-text').textContent = parts.join(' · ');
  $('notif-banner').style.display = 'flex';
  // Store all IDs ready to mark seen on dismiss
  $('notif-banner').dataset.ids = JSON.stringify(all.map(n=>n.id));
}
function dismissNotif() {
  try {
    const ids = JSON.parse($('notif-banner').dataset.ids || '[]');
    const seen = getSeenIds();
    localStorage.setItem('to_seen_ids', JSON.stringify([...new Set([...seen, ...ids])]));
  } catch {}
  $('notif-banner').style.display = 'none';
}

// ── Calendar data load ──
function _calShowLoading(show) {
  const loading = $('cal-loading'), error = $('cal-error'), wrap = $('cal-wrap-inner');
  if (show) { loading.style.display = 'block'; error.style.display = 'none'; wrap.style.display = 'none'; }
  else       { loading.style.display = 'none'; wrap.style.display = ''; }
}
function _calShowError(msg) {
  $('cal-loading').style.display = 'none';
  $('cal-wrap-inner').style.display = 'none';
  $('cal-error-msg').textContent = msg || 'Unknown error';
  $('cal-error').style.display = 'block';
}
function reloadCalendar() {
  const key = `${calYear}-${calMonth}`;
  delete _calCache[key]; // bust cache so retry actually fetches
  loadCalendarData().then(() => { renderCalendar(); loadPersonFilter(); });
}

async function loadCalendarData() {
  const yr  = calYear;
  const key = `${yr}-${calMonth}`;

  // Return cached data if still fresh
  const cached = _calCache[key];
  if (cached && (Date.now() - cached.ts) < CAL_CACHE_TTL) {
    calEvents    = cached.events;
    statHolidays = cached.holidays;
    return;
  }

  _calShowLoading(true);
  try {
    const from = new Date(yr, calMonth - 1, 1).toISOString().slice(0,10);
    const to   = new Date(yr, calMonth + 7, 1).toISOString().slice(0,10);
    const [evRes, holRes] = await Promise.all([
      fetch(`/api/time-off/calendar?from_date=${from}&to_date=${to}`),
      fetch(`/api/time-off/holidays?from_year=${yr-1}&to_year=${yr+2}`)
    ]);
    if (!evRes.ok) throw new Error(`Calendar API returned ${evRes.status}`);
    calEvents = await evRes.json();
    const hols = holRes.ok ? await holRes.json() : [];
    statHolidays = {};
    hols.forEach(h => { statHolidays[h.date] = h.name; });
    // Cache result
    _calCache[key] = { events: calEvents, holidays: statHolidays, ts: Date.now() };
    _calShowLoading(false);
  } catch (err) {
    _calShowError(err.message || 'Could not reach the server.');
    throw err; // re-throw so callers can choose to handle silently
  }
}

function loadPersonFilter() {
  const people = {};
  const peopleColors = {};
  calEvents.forEach(e => {
    if (e.user_id) {
      people[e.user_id] = e.user_name;
      if (e.time_off_color) peopleColors[e.user_id] = e.time_off_color;
    }
  });
  const sel = $('cf-person');
  sel.innerHTML = '<option value="">Everyone</option>';
  Object.entries(people).sort((a,b)=>a[1].localeCompare(b[1])).forEach(([id,name]) => {
    sel.innerHTML += `<option value="${id}">${name}</option>`;
  });
  renderLegend(people, peopleColors);
}

function renderLegend(people, peopleColors) {
  peopleColors = peopleColors || {};
  const lg = $('cal-legend');
  const items = Object.entries(people).sort((a,b)=>a[1].localeCompare(b[1])).map(([id,name]) => {
    const c = userColor(id, peopleColors[id]);
    return `<div class="legend-item"><div class="legend-dot" style="background:${c.bg};border:1px solid ${c.border};"></div><span>${name}</span></div>`;
  });
  if (!items.length) { lg.style.display='none'; return; }
  lg.style.display='flex';
  lg.innerHTML = '<span style="font-size:11px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-right:4px;">WHO:</span>' + items.join('');
}

$('cal-prev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} loadCalendarData().then(()=>{renderCalendar();loadPersonFilter();}); });
$('cal-next').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} loadCalendarData().then(()=>{renderCalendar();loadPersonFilter();}); });
$('cf-person').addEventListener('change', renderCalendar);

function renderCalendar() {
  const filterPerson = $('cf-person').value;
  const title = new Date(calYear, calMonth, 1).toLocaleDateString('en-CA', {month:'long',year:'numeric'});
  $('cal-title').textContent = title;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date().toISOString().slice(0,10);
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();

  const grid = $('cal-grid');
  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.innerHTML = `<div class="cal-num">${prevMonthDays - firstDay + 1 + i}</div>`;
    grid.appendChild(cell);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (dateStr === today ? ' today' : '');

    const numEl = document.createElement('div');
    numEl.className = 'cal-num'; numEl.textContent = d; cell.appendChild(numEl);

    if (statHolidays[dateStr]) {
      const span = document.createElement('span');
      span.className = 'cal-stat'; span.title = statHolidays[dateStr];
      span.textContent = statHolidays[dateStr]; cell.appendChild(span);
    }

    calEvents
      .filter(e => {
        if (e.start_date > dateStr || e.end_date < dateStr) return false;
        if (filterPerson && String(e.user_id) !== filterPerson) return false;
        return true;
      })
      .forEach(e => {
        const isMine = e.user_id === currentUser?.id;
        const span = document.createElement('span');
        const c = userColor(e.user_id, e.time_off_color);

        if (e.status === 'pending') {
          // Pending: striped + user color border
          span.className = `cal-event pending${isMine ? ' mine' : ''}`;
          span.style.color = c.text;
          span.style.borderColor = c.border;
        } else {
          // Approved: solid user color
          span.className = `cal-event approved${isMine ? ' mine' : ''}`;
          span.style.background = c.bg;
          span.style.color = c.text;
        }

        // Pending requests are only ever shown to the person who submitted them
        // so if it's pending here, it's always "mine"
        const label = e.status === 'pending' ? `⏳ ${e.user_name} (pending)` : e.user_name;
        span.textContent = label;
        span.title = `${e.user_name} — ${e.type} | ${e.start_date} to ${e.end_date}${e.half_day ? ' (' + e.half_day + ')' : ''}`;
        span.addEventListener('click', ev => { ev.stopPropagation(); showEventDetail(e); });
        cell.appendChild(span);
      });

    grid.appendChild(cell);
  }

  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell other-month';
    cell.innerHTML = `<div class="cal-num">${i}</div>`;
    grid.appendChild(cell);
  }
}

function showEventDetail(e) {
  const days = dayCount(e.start_date, e.end_date);
  const rtwLine = e.return_to_work_date ? `<br><span style="opacity:.7;font-size:12px;">🏁 Returns: ${fmtDate(e.return_to_work_date)}</span>` : '';
  $('event-popup-content').innerHTML = `
    <strong>${e.user_name}</strong> — ${e.type}<br>
    ${fmtDate(e.start_date)}${e.start_date !== e.end_date ? ' → ' + fmtDate(e.end_date) : ''}
    ${e.half_day ? `<br><em>${e.half_day === 'morning' ? '☀️ Morning only' : '🌇 Afternoon only'}</em>` : ''}
    ${rtwLine}
    <br><span style="opacity:.7;font-size:12px;">${days} day${days!==1?'s':''} · ${e.status}</span>
    ${e.note ? `<br><span style="opacity:.7;font-size:12px;">"${e.note}"</span>` : ''}
  `;
  const popup = $('event-popup');
  popup.classList.add('show');
  clearTimeout(popup._timer);
  popup._timer = setTimeout(closeEventPopup, 6000);
}
function closeEventPopup() { $('event-popup').classList.remove('show'); }
document.addEventListener('click', e => { if (!$('event-popup').contains(e.target)) closeEventPopup(); });

// ── Auto-fill return-to-work ──
function autoFillRTW() {
  const end = $('to-end').value;
  if (!end) return;
  const d = new Date(end + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  // Skip to Monday if landing on weekend
  if (d.getDay() === 6) d.setDate(d.getDate() + 2);
  if (d.getDay() === 0) d.setDate(d.getDate() + 1);
  $('to-rtw').value = d.toISOString().slice(0,10);
}
$('to-end').addEventListener('change', () => { autoFillRTW(); checkOverlap(); });
$('to-start').addEventListener('change', () => {
  // Keep end >= start
  if ($('to-end').value && $('to-end').value < $('to-start').value) {
    $('to-end').value = $('to-start').value;
  }
  autoFillRTW();
  checkOverlap();
});

// ── Overlap check ──
async function checkOverlap() {
  const start = $('to-start').value, end = $('to-end').value;
  if (!start || !end || start > end) return;
  const overlapping = calEvents.filter(e => e.status === 'approved' && e.user_id !== currentUser?.id && e.start_date <= end && e.end_date >= start);
  const warn = $('overlap-warning');
  if (overlapping.length) {
    const names = [...new Set(overlapping.map(e => e.user_name))];
    warn.innerHTML = `⚠️ <strong>Heads up:</strong> ${names.join(', ')} ${names.length===1?'is':'are'} already approved off during this period.`;
    warn.style.display = 'block';
  } else { warn.style.display = 'none'; }
}

// ── Submit request ──
$('btn-submit-req').addEventListener('click', async () => {
  const type    = $('to-type').value;
  const start   = $('to-start').value;
  const end     = $('to-end').value;
  const rtw     = $('to-rtw').value;
  const halfDay = $('to-halfday').value;
  const note    = $('to-note').value.trim();
  const errEl   = $('req-error');
  errEl.style.display = 'none';
  if (!start || !end) { errEl.textContent = 'Please select start and end dates.'; errEl.style.display='block'; return; }
  if (start > end)    { errEl.textContent = 'Start date must be on or before end date.'; errEl.style.display='block'; return; }
  if (!rtw)           { errEl.textContent = 'Please set your return to work date.'; errEl.style.display='block'; return; }

  $('btn-submit-req').disabled = true;
  $('btn-submit-req').textContent = 'Submitting…';
  try {
    const r = await fetch('/api/time-off', { credentials: 'include',
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type, start_date: start, end_date: end, return_to_work_date: rtw, half_day: halfDay||null, note: note||null })
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) { errEl.textContent = d.error || 'Failed to submit.'; errEl.style.display='block'; return; }
    showToast('Time off request submitted!', 'success');
    const t1 = new Date(); t1.setDate(t1.getDate() + 1);
    const t2 = new Date(); t2.setDate(t2.getDate() + 7);
    $('to-start').value = t1.toISOString().slice(0,10);
    $('to-end').value   = t2.toISOString().slice(0,10);
    $('to-note').value = ''; $('to-halfday').value = '';
    autoFillRTW();
    $('overlap-warning').style.display = 'none';
    // Refresh calendar in background — don't let a calendar fetch failure
    // show "Network error" on a successful submit
    loadCalendarData().then(() => loadPersonFilter()).catch(() => {});
    showTab('my');
  } catch { errEl.textContent = 'Could not submit — check your connection and try again.'; errEl.style.display='block'; }
  finally { $('btn-submit-req').disabled = false; $('btn-submit-req').textContent = 'Submit Request'; }
});

// ── My requests ──
async function loadMyRequests() {
  const r = await fetch('/api/time-off');
  const all = r.ok ? await r.json() : [];
  const myReqs = all.filter(req => req.user_id === currentUser.id);
  const list = $('my-req-list');
  if (!myReqs.length) { list.innerHTML = '<div class="empty-notice">No requests yet. Use "New Request" to submit your first one.</div>'; return; }
  const c = userColor(currentUser.id);
  list.innerHTML = myReqs.map(req => {
    const days = dayCount(req.start_date, req.end_date);
    const halfLabel = req.half_day ? ` — ${req.half_day}` : '';
    const rtwLine = req.return_to_work_date ? `<div style="font-size:12px;color:var(--gray-500);margin-top:2px;">🏁 Return to work: <strong>${fmtDate(req.return_to_work_date)}</strong></div>` : '';
    const reviewNote = req.review_note ? `<div style="font-size:12px;color:var(--gray-500);margin-top:4px;">Office note: "${req.review_note}"</div>` : '';

    // Action buttons based on status
    let actionBtns = '';
    if (['pending','approved'].includes(req.status)) {
      actionBtns += `<button class="cancel-btn" onclick="cancelRequest(${req.id})">Cancel</button> `;
    }
    if (['pending','cancelled'].includes(req.status)) {
      actionBtns += `<button class="edit-btn" onclick="openEditRequest(${req.id})">✏ Edit${req.status === 'cancelled' ? ' & Re-submit' : ''}</button> `;
    }
    if (['cancelled','denied'].includes(req.status)) {
      actionBtns += `<button class="delete-btn" onclick="deleteRequest(${req.id})">🗑 Delete</button>`;
    }

    // Swipe hint for cancelled/denied
    const canDelete = ['cancelled','denied'].includes(req.status);
    return `<div class="req-item" id="req-${req.id}" data-id="${req.id}" data-can-delete="${canDelete}">
      ${canDelete ? '<div class="swipe-delete-bg" onclick="deleteRequest(' + req.id + ')">🗑 Delete</div>' : ''}
      <div class="req-type-dot" style="background:${c.bg};border:2px solid ${c.border};"></div>
      <div class="req-info">
        <div class="req-dates">${fmtDate(req.start_date)}${req.start_date !== req.end_date ? ' → ' + fmtDate(req.end_date) : ''}${halfLabel}</div>
        <div class="req-meta">${req.type} · ${days} day${days!==1?'s':''} · Submitted ${fmtDate(req.created_at?.slice(0,10))}</div>
        ${rtwLine}${reviewNote}
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">${actionBtns}</div>
      </div>
      <span class="req-status ${req.status}">${req.status}</span>
    </div>`;
  }).join('');

  // Attach swipe-to-delete touch handlers for cancelled/denied items
  list.querySelectorAll('.req-item[data-can-delete="true"]').forEach(attachSwipe);
}

function attachSwipe(el) {
  let startX = 0, moved = false;
  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; moved = false; }, { passive: true });
  el.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    moved = true;
    if (dx < -40) el.classList.add('swipe-reveal');
    else if (dx > 10) el.classList.remove('swipe-reveal');
  }, { passive: true });
  el.addEventListener('touchend', () => {
    if (!moved) el.classList.remove('swipe-reveal');
  });
  // Tap outside to close reveal
  document.addEventListener('touchstart', e => {
    if (!el.contains(e.target)) el.classList.remove('swipe-reveal');
  }, { passive: true });
}

async function cancelRequest(id) {
  if (!confirm('Cancel this time off request?')) return;
  const r = await fetch(`/api/time-off/${id}/cancel`, {method:'PATCH', credentials:'include'});
  if (r.ok) { showToast('Request cancelled.'); await loadCalendarData(); loadPersonFilter(); loadMyRequests(); }
  else { const d = await r.json().catch(()=>({})); showToast(d.error || 'Failed to cancel.', 'error'); }
}

async function deleteRequest(id) {
  if (!confirm('Permanently delete this request? This cannot be undone.')) return;
  const el = $(`req-${id}`);
  if (el) el.classList.add('deleting');
  const r = await fetch(`/api/time-off/${id}`, {method:'DELETE', credentials:'include'});
  if (r.ok) { showToast('Request deleted.'); setTimeout(() => loadMyRequests(), 300); }
  else {
    if (el) el.classList.remove('deleting');
    const d = await r.json().catch(()=>({})); showToast(d.error || 'Failed to delete.', 'error');
  }
}

// ── Edit request modal ──
let editingId = null;
function openEditRequest(id) {
  // Grab data from the rendered list (we already fetched it)
  fetch(`/api/time-off/${id}`).then(r => r.json()).then(req => {
    editingId = id;
    $('edit-type').value    = req.type || 'Vacation';
    $('edit-start').value   = req.start_date || '';
    $('edit-end').value     = req.end_date   || '';
    $('edit-rtw').value     = req.return_to_work_date || '';
    $('edit-halfday').value = req.half_day   || '';
    $('edit-note').value    = req.note       || '';
    $('edit-error').style.display = 'none';
    $('edit-resubmit-note').textContent = req.status === 'cancelled'
      ? '💡 Saving will re-submit this as a new pending request for approval.'
      : '💡 Saving will update and keep this request as pending.';
    $('edit-modal-overlay').style.display = 'flex';
  });
}
function closeEditModal() {
  $('edit-modal-overlay').style.display = 'none';
  editingId = null;
}

// Auto-fill RTW in edit modal
$('edit-end').addEventListener('change', () => {
  const end = $('edit-end').value;
  if (!end || $('edit-rtw').value) return; // don't override if already set
  const d = new Date(end + 'T00:00:00'); d.setDate(d.getDate() + 1);
  if (d.getDay() === 6) d.setDate(d.getDate() + 2);
  if (d.getDay() === 0) d.setDate(d.getDate() + 1);
  $('edit-rtw').value = d.toISOString().slice(0,10);
});

$('btn-save-edit').addEventListener('click', async () => {
  if (!editingId) return;
  const type    = $('edit-type').value;
  const start   = $('edit-start').value;
  const end     = $('edit-end').value;
  const rtw     = $('edit-rtw').value;
  const halfDay = $('edit-halfday').value;
  const note    = $('edit-note').value.trim();
  const errEl   = $('edit-error');
  errEl.style.display = 'none';
  if (!start || !end) { errEl.textContent = 'Please select start and end dates.'; errEl.style.display='block'; return; }
  if (start > end)    { errEl.textContent = 'Start date must be on or before end date.'; errEl.style.display='block'; return; }

  $('btn-save-edit').disabled = true; $('btn-save-edit').textContent = 'Saving…';
  try {
    const r = await fetch(`/api/time-off/${editingId}`, {
      method: 'PATCH', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ type, start_date: start, end_date: end, return_to_work_date: rtw||null, half_day: halfDay||null, note: note||null })
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) { errEl.textContent = d.error || 'Failed to save.'; errEl.style.display='block'; return; }
    showToast('Request updated & re-submitted ✓', 'success');
    closeEditModal();
    await loadCalendarData(); loadPersonFilter(); loadMyRequests();
  } catch { errEl.textContent = 'Network error. Try again.'; errEl.style.display='block'; }
  finally { $('btn-save-edit').disabled = false; $('btn-save-edit').textContent = 'Save & Re-submit'; }
});

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d.slice(0,10) + 'T00:00:00');
  return dt.toLocaleDateString('en-CA', {month:'short', day:'numeric', year:'numeric'});
}
function dayCount(start, end) {
  const s = new Date(start + 'T00:00:00'), e = new Date(end + 'T00:00:00');
  return Math.round((e - s) / 86400000) + 1;
}
